services:
  - type: web
    name: smart-money-tracker
    runtime: python
    plan: free
    region: singapore
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:server --bind 0.0.0.0:$PORT --workers 2 --threads 4 --timeout 180
    healthCheckPath: /
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
